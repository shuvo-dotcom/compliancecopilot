name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: shuvo-dotcom
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          build-args: NEXT_PUBLIC_API_URL=http://localhost:8000
          tags: |
            ghcr.io/shuvo-dotcom/compliancecopilot-web:latest
            ghcr.io/shuvo-dotcom/compliancecopilot-web:${{ github.ref_name }}

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: |
            ghcr.io/shuvo-dotcom/compliancecopilot-api:latest
            ghcr.io/shuvo-dotcom/compliancecopilot-api:${{ github.ref_name }}

  build-dmg:
    runs-on: macos-latest
    needs: push-images
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift app + DMG
        run: |
          # Use whatever Xcode is default on the runner (Swift is all we need)
          swift --version
          bash scripts/build-dmg.sh

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/ComplianceCopilot.dmg
