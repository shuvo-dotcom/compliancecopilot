name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: shuvo-dotcom
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: true
          provenance: false
          build-args: NEXT_PUBLIC_API_URL=http://localhost:8000
          tags: |
            ghcr.io/shuvo-dotcom/compliancecopilot-web:latest
            ghcr.io/shuvo-dotcom/compliancecopilot-web:${{ github.ref_name }}

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          provenance: false
          tags: |
            ghcr.io/shuvo-dotcom/compliancecopilot-api:latest
            ghcr.io/shuvo-dotcom/compliancecopilot-api:${{ github.ref_name }}

  build-dmg:
    runs-on: macos-latest
    needs: push-images
    permissions:
      contents: write
    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift app + DMG
        run: |
          swift --version
          bash scripts/build-dmg.sh

      - name: Compute DMG SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 build/ComplianceCopilot.dmg | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Extract version (strip leading v)
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/ComplianceCopilot.dmg

  update-cask:
    runs-on: ubuntu-latest
    needs: build-dmg
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: shuvo-dotcom/homebrew-compliancecopilot
          token: ${{ secrets.GHCR_PAT }}

      - name: Update cask version and SHA256
        run: |
          VERSION="${{ needs.build-dmg.outputs.version }}"
          SHA256="${{ needs.build-dmg.outputs.sha256 }}"
          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/compliancecopilot.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/compliancecopilot.rb

      - name: Commit and push updated cask
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/compliancecopilot.rb
          git commit -m "chore: update cask to v${{ needs.build-dmg.outputs.version }}"
          git push
