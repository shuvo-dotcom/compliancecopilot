[mypy]
ignore_missing_imports = True
# SQLAlchemy Column() ORM attribute assignments are valid at runtime.
# pydantic-settings fields are populated from env vars, not constructor args.
disable_error_codes = call-arg, assignment, var-annotated

[mypy-core.config]
ignore_errors = True

[mypy-jobs.models]
ignore_errors = True

[mypy-jobs.service]
ignore_errors = True

[mypy-review_queue.service]
ignore_errors = True

[mypy-auth.service]
ignore_errors = True

[mypy-sqlalchemy.*]
ignore_errors = True

[mypy-pgvector.*]
ignore_errors = True

[mypy-langgraph.*]
ignore_errors = True

[mypy-langchain.*]
ignore_errors = True

[mypy-langchain_community.*]
ignore_errors = True

[mypy-litellm.*]
ignore_errors = True

[mypy-webauthn.*]
ignore_errors = True

[mypy-minio.*]
ignore_errors = True

[mypy-pypdf.*]
ignore_errors = True

[mypy-docx.*]
ignore_errors = True

[mypy-redis.*]
ignore_errors = True
