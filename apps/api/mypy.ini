[mypy]
plugins = sqlalchemy.ext.mypy.plugin
ignore_missing_imports = True
# pydantic-settings model instantiation is validated at runtime, not by mypy
# SQLAlchemy ORM column assignments are checked by the plugin above
disable_error_codes = call-arg

[mypy-sqlalchemy.*]
ignore_errors = True

[mypy-pgvector.*]
ignore_errors = True

[mypy-langgraph.*]
ignore_errors = True

[mypy-langchain.*]
ignore_errors = True

[mypy-langchain_community.*]
ignore_errors = True

[mypy-litellm.*]
ignore_errors = True

[mypy-webauthn.*]
ignore_errors = True

[mypy-minio.*]
ignore_errors = True

[mypy-pypdf.*]
ignore_errors = True

[mypy-docx.*]
ignore_errors = True

[mypy-redis.*]
ignore_errors = True
