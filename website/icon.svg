<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <filter id="shieldShadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0284c7" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Shield — centered, ~60% of canvas -->
  <g filter="url(#shieldShadow)">
    <path d="M512 148 L776 240 L776 500 Q776 678 512 876 Q248 678 248 500 L248 240 Z"
      fill="url(#shieldGrad)"/>
  </g>

  <!-- Checkmark -->
  <polyline
    points="362,510 460,610 668,390"
    fill="none"
    stroke="white"
    stroke-width="68"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.97"/>
</svg>
